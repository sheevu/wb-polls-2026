<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2026 Scenario Network</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <style>
    body { margin: 0; background-color: #05050A; overflow: hidden; touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // Inline SVGs for icons (replacing lucide-react for standalone HTML deployment)
    const NetworkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><rect x="16" y="16" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="2" width="6" height="6" rx="1"></rect><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"></path><path d="M12 12V8"></path></svg>;
    const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 text-blue-400"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const MaximizeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>;
    const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

    // --- Data Preparation ---
    const rawData = [
      ['Cooch Behar', 9, 8, 1, 0, 0, 0], ['Alipurduar', 5, 5, 0, 0, 0, 0],
      ['Jalpaiguri', 7, 6, 1, 0, 0, 0], ['Darjeeling & Kalimpong', 6, 6, 0, 0, 0, 0],
      ['Uttar Dinajpur', 9, 7, 2, 0, 0, 0], ['Dakshin Dinajpur', 6, 5, 1, 0, 0, 0],
      ['Malda', 12, 6, 4, 2, 0, 0], ['Murshidabad', 20, 5, 11, 3, 1, 0],
      ['Kolkata', 11, 4, 6, 1, 0, 0], ['North 24-Parganas', 33, 13, 16, 1, 2, 1],
      ['South 24-Parganas', 31, 10, 18, 0, 3, 0], ['Howrah', 16, 8, 7, 0, 1, 0],
      ['Hooghly', 19, 10, 8, 0, 1, 0], ['Nadia', 17, 10, 6, 0, 1, 0],
      ['Paschim Medinipur', 15, 10, 4, 0, 1, 0], ['Purba Medinipur', 16, 10, 5, 0, 1, 0],
      ['Bankura', 12, 7, 4, 0, 1, 0], ['Purulia', 9, 6, 2, 0, 1, 0],
      ['Jhargram', 4, 2, 2, 0, 0, 0], ['Birbhum', 11, 6, 4, 0, 1, 0],
      ['Bardhaman (Purba)', 16, 7, 8, 0, 1, 0], ['Bardhaman (Paschim)', 9, 4, 4, 0, 1, 0],
      ['Other small districts', 8, 4, 3, 0, 1, 0],
    ];

    const parties = [
      { id: 'BJP', color: '#f97316', total: 165 }, 
      { id: 'AITC', color: '#22c55e', total: 115 }, 
      { id: 'INC', color: '#3b82f6', total: 8 },   
      { id: 'Left/ISF', color: '#ef4444', total: 5 }, 
      { id: 'Others', color: '#a855f7', total: 1 }    
    ];

    const regionsMap = {
      'North Bengal': ['Cooch Behar', 'Alipurduar', 'Jalpaiguri', 'Darjeeling & Kalimpong', 'Uttar Dinajpur', 'Dakshin Dinajpur', 'Malda'],
      'Gangetic Plains': ['Murshidabad', 'Kolkata', 'North 24-Parganas', 'South 24-Parganas', 'Howrah', 'Hooghly', 'Nadia'],
      'Junglemahal & West': ['Paschim Medinipur', 'Purba Medinipur', 'Bankura', 'Purulia', 'Jhargram', 'Birbhum', 'Bardhaman (Purba)', 'Bardhaman (Paschim)', 'Other small districts']
    };

    function App() {
      const containerRef = useRef(null);
      const [activeNode, setActiveNode] = useState(null);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [dimensions, setDimensions] = useState({ width: window.innerWidth, height: window.innerHeight });

      useEffect(() => {
        const handleResize = () => setDimensions({ width: window.innerWidth, height: window.innerHeight });
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const { width, height } = dimensions;

        const svgEl = d3.select(containerRef.current);
        svgEl.selectAll("*").remove();

        const svg = svgEl
          .attr("viewBox", [0, 0, width, height])
          .style("background-color", "#05050A")
          .style("touch-action", "none");

        const g = svg.append("g");

        const defs = svg.append("defs");
        const filter = defs.append("filter").attr("id", "glow");
        filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        const nodes = [];
        const links = [];

        parties.forEach(p => nodes.push({ 
          id: p.id, type: 'party', seats: p.total, color: p.color, 
          radius: Math.sqrt(p.total) * 3 + 15 
        }));

        Object.keys(regionsMap).forEach(r => nodes.push({ 
          id: r, type: 'region', color: '#334155', radius: 15 
        }));

        rawData.forEach(row => {
          const [name, total, bjp, aitc, inc, left, others] = row;
          const scores = { BJP: bjp, AITC: aitc, INC: inc, 'Left/ISF': left, Others: others };
          const dominant = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
          const domColor = parties.find(p => p.id === dominant)?.color || '#aa00ff';
          
          nodes.push({ id: name, type: 'district', total, scores, dominant, color: domColor, radius: total * 1.5 + 5 });

          const region = Object.keys(regionsMap).find(r => regionsMap[r].includes(name)) || 'Junglemahal & West';
          
          links.push({ source: name, target: region, type: 'region-link', value: 1 });

          Object.entries(scores).forEach(([party, seats]) => {
            if (seats > 0) {
              links.push({ source: name, target: party, type: 'party-link', value: seats, color: parties.find(p=>p.id===party)?.color });
            }
          });
        });

        const simulation = d3.forceSimulation(nodes)
          .force("link", d3.forceLink(links).id(d => d.id).distance(d => d.type === 'region-link' ? 40 : 150).strength(d => d.type === 'region-link' ? 0.5 : d.value * 0.01))
          .force("charge", d3.forceManyBody().strength(d => d.type === 'party' ? -1000 : -200))
          .force("collide", d3.forceCollide().radius(d => d.radius + 10).iterations(3))
          .force("x", d3.forceX(d => {
            if (d.id === 'North Bengal') return width * 0.5;
            if (d.id === 'Gangetic Plains') return width * 0.7;
            if (d.id === 'Junglemahal & West') return width * 0.3;
            if (d.id === 'BJP') return width * 0.2; 
            if (d.id === 'AITC') return width * 0.8;
            return width / 2;
          }).strength(0.1))
          .force("y", d3.forceY(d => {
            if (d.id === 'North Bengal') return height * 0.2; 
            if (d.id === 'Gangetic Plains') return height * 0.8; 
            if (d.id === 'Junglemahal & West') return height * 0.6;
            return height / 2;
          }).strength(0.1));

        const link = g.append("g")
          .attr("stroke-opacity", 0.4)
          .selectAll("line")
          .data(links)
          .join("line")
          .attr("stroke", d => d.type === 'region-link' ? '#1e293b' : d.color)
          .attr("stroke-width", d => d.type === 'region-link' ? 1 : Math.max(1, d.value * 0.5))
          .attr("stroke-dasharray", d => d.type === 'region-link' ? "4,4" : "none");

        const node = g.append("g")
          .selectAll("g")
          .data(nodes)
          .join("g")
          .attr("cursor", "pointer")
          .call(d3.drag()
            .on("start", (event, d) => {
              if (!event.active) simulation.alphaTarget(0.3).restart();
              d.fx = d.x; d.fy = d.y;
            })
            .on("drag", (event, d) => {
              d.fx = event.x; d.fy = event.y;
            })
            .on("end", (event, d) => {
              if (!event.active) simulation.alphaTarget(0);
              d.fx = null; d.fy = null;
            })
          );

        node.append("circle")
          .attr("r", d => d.radius)
          .attr("fill", d => d.type === 'region' ? '#0f172a' : `${d.color}cc`)
          .attr("stroke", d => d.color)
          .attr("stroke-width", d => d.type === 'region' ? 2 : 2)
          .attr("filter", d => d.type === 'party' ? "url(#glow)" : null)
          .attr("class", "node-circle")
          .style("transition", "stroke-width 0.2s");

        node.append("text")
          .text(d => d.id)
          .attr("y", d => d.type === 'party' ? 0 : d.radius + 15)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", d => d.type === 'party' ? "middle" : "auto")
          .attr("fill", d => d.type === 'region' ? '#64748b' : '#f8fafc')
          .attr("font-size", d => d.type === 'party' ? "18px" : "12px")
          .attr("font-weight", d => d.type === 'party' ? "bold" : "normal")
          .attr("pointer-events", "none")
          .style("text-shadow", "0px 2px 4px rgba(0,0,0,0.8)");

        node.on("click", (event, d) => {
          if (navigator.vibrate) navigator.vibrate(50);
          setActiveNode(d);
          d3.selectAll(".node-circle").attr("stroke-width", 2).attr("stroke", n => n.color);
          d3.select(event.currentTarget).select("circle").attr("stroke-width", 5).attr("stroke", "#fff");

          const scale = 1.5;
          svg.transition().duration(750).call(
            zoom.transform, 
            d3.zoomIdentity.translate(width / 2 - d.x * scale, height / 2 - d.y * scale).scale(scale)
          );
        });

        simulation.on("tick", () => {
          link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
              .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
          node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        const zoom = d3.zoom()
          .scaleExtent([0.2, 4])
          .on("zoom", (event) => g.attr("transform", event.transform));
        
        svg.call(zoom);
        svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.85).translate(-width/2, -height/2));

        return () => simulation.stop();
      }, [dimensions]);

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => console.log(err));
          setIsFullscreen(true);
        } else {
          document.exitFullscreen();
          setIsFullscreen(false);
        }
      };

      return (
        <div className={`relative bg-[#05050A] text-white overflow-hidden font-sans ${isFullscreen ? 'fixed inset-0 z-50' : 'w-full h-screen'}`}>
          <svg ref={containerRef} className="w-full h-full cursor-grab active:cursor-grabbing" />

          <div className="absolute top-0 left-0 w-full p-4 pointer-events-none flex justify-between items-start z-10">
            <div className="bg-slate-900/80 border border-slate-800 rounded-2xl p-4 shadow-xl pointer-events-auto backdrop-blur-md">
              <h1 className="text-xl md:text-2xl font-bold bg-gradient-to-r from-orange-500 via-slate-300 to-green-500 bg-clip-text text-transparent mb-1">
                Sudarshan AI Labs
              </h1>
              <p className="text-xs md:text-sm text-slate-400 flex items-center">
                <NetworkIcon />
                2026 Touch Network Scenario
              </p>
            </div>

            <button 
              onClick={toggleFullscreen}
              className="pointer-events-auto p-3 bg-slate-900/80 hover:bg-slate-700 border border-slate-800 rounded-full text-white backdrop-blur-md shadow-lg"
            >
              <MaximizeIcon />
            </button>
          </div>

          {activeNode && (
            <div className="absolute bottom-6 left-0 right-0 mx-auto w-[90%] max-w-sm bg-slate-900/95 border border-slate-700 rounded-2xl shadow-2xl backdrop-blur-md overflow-hidden transform transition-all z-20">
              <div className="p-4 relative">
                <button 
                  onClick={() => setActiveNode(null)}
                  className="absolute top-4 right-4 text-slate-400 hover:text-white"
                >
                  <XIcon />
                </button>
                
                <h3 className="font-bold text-xl mb-1" style={{ color: activeNode.color }}>
                  {activeNode.id}
                </h3>
                
                {activeNode.type === 'party' && (
                  <p className="text-slate-300">Projected Statewide Total: <span className="font-mono text-white text-lg ml-2">{activeNode.seats}</span></p>
                )}
                
                {activeNode.type === 'district' && (
                  <React.Fragment>
                    <p className="text-slate-400 text-sm mb-4 border-b border-slate-700 pb-2">Total Assembly Seats: {activeNode.total}</p>
                    <div className="space-y-2">
                      {Object.entries(activeNode.scores).map(([p, s]) => s > 0 && (
                        <div key={p} className="flex justify-between items-center bg-slate-800/50 p-2 rounded-lg">
                          <span className="font-medium" style={{ color: parties.find(x => x.id === p)?.color }}>{p}</span>
                          <span className="font-mono text-white bg-slate-800 px-3 py-1 rounded shadow-inner">{s}</span>
                        </div>
                      ))}
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
          )}

          {!activeNode && (
            <div className="absolute bottom-6 left-0 w-full px-4 pointer-events-none flex justify-center z-10">
              <div className="bg-slate-900/80 border border-slate-700 rounded-full py-2 px-4 text-xs text-slate-300 flex items-center shadow-xl backdrop-blur-md">
                <InfoIcon />
                Pinch to Zoom • Drag Nodes • Tap to Inspect
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
